<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle - dark blue -->
  <circle cx="256" cy="256" r="250" fill="#1e3a8a"/>
  
  <!-- Airplane body (fuselage) -->
  <rect x="180" y="240" width="140" height="30" fill="white" rx="15"/>
  
  <!-- Airplane nose -->
  <path d="M180 240 L150 225 L150 255 Z" fill="white"/>
  
  <!-- Airplane tail -->
  <path d="M320 240 L350 225 L350 255 Z" fill="white"/>
  
  <!-- Wings -->
  <path d="M200 240 L280 200 L300 210 L280 220 Z" fill="white"/>
  <path d="M200 270 L280 310 L300 300 L280 290 Z" fill="white"/>
  
  <!-- Vertical stabilizer -->
  <path d="M320 225 L340 200 L340 225 Z" fill="white"/>
  <path d="M320 255 L340 280 L340 255 Z" fill="white"/>
  
  <!-- Inner circle - slightly darker -->
  <circle cx="256" cy="256" r="200" fill="#2563eb" opacity="0.3"/>
</svg>
